<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ပထမပြန် အောင်စာရင်း ရှာဖွေရေး</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Padauk:wght@400;700&display=swap');
        body { font-family: 'Padauk', sans-serif; }
        
        /* မှန်သားပြင် Effect Custom Style */
        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* SweetAlert Custom Font */
        .swal2-popup { font-family: 'Padauk', sans-serif !important; }
    </style>
    <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-X9WHE95R76"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-X9WHE95R76');
</script>
</head>
<body class="bg-gradient-to-br from-indigo-900 via-purple-900 to-blue-900 min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

    <div class="absolute top-10 left-10 w-64 h-64 bg-blue-500/30 rounded-full blur-3xl mix-blend-screen pointer-events-none"></div>
    <div class="absolute bottom-10 right-10 w-72 h-72 bg-purple-500/30 rounded-full blur-3xl mix-blend-screen pointer-events-none"></div>

    <div class="glass-panel shadow-2xl rounded-3xl p-8 w-full max-w-2xl relative z-10 flex flex-col min-h-[500px] justify-between">
        
        <div>
            <div class="text-center mb-8">
                <h1 class="text-3xl md:text-4xl font-bold text-white mb-2 tracking-wide drop-shadow-lg">ပထမပြန် အောင်စာရင်း</h1>
                <p class="text-blue-200 text-sm md:text-base">သာသနာရေးဦးစီးဌာနမှ ထုတ်ပြန်သော အောင်စာရင်းများ</p>
            </div>

            <form class="space-y-6" id="searchForm">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-white/90 text-sm font-medium mb-2 text-shadow">တိုင်းဒေသကြီး / ပြည်နယ်</label>
                        <select id="stateSelect" class="w-full bg-white/10 border border-white/20 text-white rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-400 appearance-none transition-all cursor-pointer">
                            <option value="" class="text-gray-900">ရွေးချယ်ပါ</option>
                            <option value="ကချင်" class="text-gray-900">ကချင်ပြည်နယ်</option>
                            <option value="ကယား" class="text-gray-900">ကယားပြည်နယ်</option>
                            <option value="ကရင်" class="text-gray-900">ကရင်ပြည်နယ်</option>
                            <option value="ချင်း" class="text-gray-900">ချင်းပြည်နယ်</option>
                            <option value="စစ်ကိုင်း" class="text-gray-900">စစ်ကိုင်းတိုင်းဒေသကြီး</option>
                            <option value="တနင်္သာရီ" class="text-gray-900">တနင်္သာရီတိုင်းဒေသကြီး</option>
                            <option value="နေပြည်တော်" class="text-gray-900">နေပြည်တော်ကောင်စီ</option>
                            <option value="ပဲခူး (အရှေ့ပိုင်း)" class="text-gray-900">ပဲခူးတိုင်းဒေသကြီး (အရှေ့ပိုင်း)</option>
                            <option value="ပဲခူး (အနောက်ပိုင်း)" class="text-gray-900">ပဲခူးတိုင်းဒေသကြီး (အနောက်ပိုင်း)</option>
                            <option value="မကွေး" class="text-gray-900">မကွေးတိုင်းဒေသကြီး</option>
                            <option value="မန္တလေး" class="text-gray-900">မန္တလေးတိုင်းဒေသကြီး</option>
                            <option value="မွန်" class="text-gray-900">မွန်ပြည်နယ်</option>
                            <option value="ရခိုင်" class="text-gray-900">ရခိုင်ပြည်နယ်</option>
                            <option value="ရန်ကုန် (အရှေ့ပိုင်း)" class="text-gray-900">ရန်ကုန်တိုင်းဒေသကြီး (အရှေ့ပိုင်း)</option>
                            <option value="ရန်ကုန် (အနောက်ပိုင်း)" class="text-gray-900">ရန်ကုန်တိုင်းဒေသကြီး (အနောက်ပိုင်း)</option>
                            <option value="ရန်ကုန် (တောင်ပိုင်း)" class="text-gray-900">ရန်ကုန်တိုင်းဒေသကြီး (တောင်ပိုင်း)</option>
                            <option value="ရန်ကုန် (မြောက်ပိုင်း)" class="text-gray-900">ရန်ကုန်တိုင်းဒေသကြီး (မြောက်ပိုင်း)</option>
                            <option value="ရှမ်း (အရှေ့ပိုင်း)" class="text-gray-900">ရှမ်းပြည်နယ် (အရှေ့ပိုင်း)</option>
                            <option value="ရှမ်း (တောင်ပိုင်း)" class="text-gray-900">ရှမ်းပြည်နယ် (တောင်ပိုင်း)</option>
                            <option value="ရှမ်း (မြောက်ပိုင်း)" class="text-gray-900">ရှမ်းပြည်နယ် (မြောက်ပိုင်း)</option>
                            <option value="ဧရာဝတီ" class="text-gray-900">ဧရာဝတီတိုင်းဒေသကြီး</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-white/90 text-sm font-medium mb-2">အတန်း</label>
                        <select id="levelSelect" class="w-full bg-white/10 border border-white/20 text-white rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-400 appearance-none transition-all cursor-pointer">
                            <option value="" class="text-gray-900">ရွေးချယ်ပါ</option>
                            <option value="ပထမကြီး" class="text-gray-900">ပထမကြီးတန်း</option>
                            <option value="ပထမလတ်" class="text-gray-900">ပထမလတ်တန်း</option>
                            <option value="ပထမငယ်" class="text-gray-900">ပထမငယ်တန်း</option>
                            <option value="အခြေခံမူလတန်း" class="text-gray-900">အခြေခံမူလတန်း</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-white/90 text-sm font-medium mb-2">အမည် (သို့မဟုတ်) ခုံနံပါတ်ဖြင့် ရှာရန် (ရွေးချယ်ရန်)</label>
                    <div class="relative">
                        <input type="text" id="searchInput" placeholder="ဥပမာ - အရှင်ဉာဏ သို့မဟုတ် ရက-၁၂၃" class="w-full bg-white/10 border border-white/20 text-white placeholder-white/50 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-400 transition-all">
                    </div>
                </div>

                <button type="button" id="searchBtn" class="w-full bg-blue-500/80 hover:bg-blue-500 text-white font-bold rounded-xl px-4 py-3 transition duration-300 border border-blue-400/50 shadow-[0_0_15px_rgba(59,130,246,0.5)] hover:shadow-[0_0_20px_rgba(59,130,246,0.8)]">
                    ရှာဖွေမည်
                </button>
            </form>
        </div>

        <div class="mt-10 flex justify-center border-t border-white/10 pt-6">
            <div class="inline-flex items-center justify-center gap-3 px-6 py-2.5 rounded-full bg-white/5 border border-white/10 shadow-[0_0_15px_rgba(255,255,255,0.05)] backdrop-blur-md hover:bg-white/10 transition duration-300 cursor-default">
                <span class="text-yellow-400 text-xl animate-pulse">✦</span>
                <p class="text-white/80 text-sm md:text-base tracking-widest font-medium flex items-center gap-2">
                    <span class="font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-yellow-100 drop-shadow-[0_0_8px_rgba(253,224,71,0.5)] text-lg md:text-xl">ဘုန်းသန္တိ</span>
                    <span class="text-white/90">ဖန်တီးသည်</span>
                </p>
                <span class="text-yellow-400 text-xl animate-pulse">✦</span>
            </div>
        </div>

    </div>

    <script>
        let driveLinksData = {};

        fetch('./data.json')
            .then(response => {
                if (!response.ok) throw new Error("JSON ဖိုင်ကို ရှာမတွေ့ပါ။");
                return response.json();
            })
            .then(data => {
                driveLinksData = data;
                console.log("Data အောင်မြင်စွာ ရယူပြီးပါပြီ");
            })
            .catch(error => console.error("Data ယူရာတွင် Error ဖြစ်နေပါသည်:", error));

        document.getElementById('searchBtn').addEventListener('click', function() {
            const state = document.getElementById('stateSelect').value;
            const level = document.getElementById('levelSelect').value;

            if (!state || !level) {
                Swal.fire({
                    icon: 'warning',
                    title: 'အချက်အလက် လိုအပ်နေပါသည်',
                    text: 'ကျေးဇူးပြု၍ တိုင်း/ပြည်နယ် နှင့် အတန်းကို ပြည့်စုံစွာ ရွေးချယ်ပါ။',
                    confirmButtonColor: '#3b82f6',
                    confirmButtonText: 'အိုကေ'
                });
                return;
            }

            if (driveLinksData[state] && driveLinksData[state][level]) {
                const targetUrl = driveLinksData[state][level];
                
                if (targetUrl.trim() !== "") {
                    Swal.fire({
                        title: 'ရှာဖွေနေပါသည်...',
                        text: 'Google Drive သို့ ခေါ်ဆောင်သွားပါမည်',
                        icon: 'success',
                        timer: 1500,
                        showConfirmButton: false,
                        willClose: () => window.open(targetUrl, '_blank')
                    });
                } else {
                    Swal.fire({
                        icon: 'info',
                        title: 'မကြာမီ လာမည်',
                        text: 'ယခုရွေးချယ်ထားသော ဒေသနှင့် အတန်းအတွက် အောင်စာရင်း လင့်ခ် မရရှိသေးပါ။',
                        confirmButtonColor: '#3b82f6',
                        confirmButtonText: 'ပိတ်မည်'
                    });
                }

            } else {
                Swal.fire({
                    icon: 'info',
                    title: 'မကြာမီ လာမည်',
                    text: 'အောင်စာရင်း မထွက်ရှိသေးပါ။',
                    confirmButtonColor: '#3b82f6',
                    confirmButtonText: 'ပိတ်မည်'
                });
            }
        });
    </script>
</body>
</html>
